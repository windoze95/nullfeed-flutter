name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: "3.41.4"

jobs:
  format-check:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Check formatting
        run: dart format --set-exit-if-changed .

  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: pub-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-

      - name: Install dependencies
        run: flutter pub get

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Run flutter analyze (warnings are errors)
        run: flutter analyze --fatal-infos --fatal-warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: pub-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-

      - name: Install dependencies
        run: flutter pub get

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Run tests
        run: flutter test

  build-ios:
    name: Build iOS
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: pub-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: ios/Pods
          key: pods-${{ runner.os }}-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: pods-${{ runner.os }}-

      - name: Install dependencies
        run: flutter pub get

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build iOS (release, no codesign)
        run: flutter build ios --release --no-codesign

  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: pub-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-

      - name: Install dependencies
        run: flutter pub get

      - name: Check for outdated dependencies
        run: |
          echo "Checking for major version drift..."
          flutter pub outdated --no-dev-dependencies --json > outdated.json

          # Parse major version drift from the JSON output
          python3 << 'PYEOF'
          import json, sys
          data = json.load(open('outdated.json'))
          packages = data.get('packages', [])
          drift = []
          for pkg in packages:
              current_info = pkg.get('current') or {}
              latest_info = pkg.get('latest') or {}
              current = current_info.get('version', '')
              latest = latest_info.get('version', '')
              if current and latest:
                  cur_major = current.split('.')[0]
                  lat_major = latest.split('.')[0]
                  if cur_major != lat_major:
                      drift.append(f"  {pkg['package']}: {current} -> {latest}")
          if drift:
              print('::warning::Major version drift detected:')
              for d in drift:
                  print(d)
          else:
              print('No major version drift found.')
          PYEOF

  agent-rules-sync:
    name: Agent Rules Sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check agent instruction files are in sync
        run: |
          TARGETS=".cursorrules .windsurfrules .clinerules .continuerules CLAUDE.md .github/copilot-instructions.md"
          OUT_OF_SYNC=""
          for target in $TARGETS; do
            if [ ! -f "$target" ]; then
              echo "::error::Missing: $target (run scripts/sync-agent-rules.sh)"
              OUT_OF_SYNC="$OUT_OF_SYNC $target"
            elif ! diff -q AGENTS.md "$target" > /dev/null 2>&1; then
              echo "::error::Out of sync: $target differs from AGENTS.md"
              OUT_OF_SYNC="$OUT_OF_SYNC $target"
            else
              echo "OK: $target"
            fi
          done
          if [ -n "$OUT_OF_SYNC" ]; then
            echo ""
            echo "Run './scripts/sync-agent-rules.sh' to fix."
            exit 1
          fi
          echo "All agent instruction files are in sync."
