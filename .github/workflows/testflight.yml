name: testflight

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  beta:
    runs-on: macos-15
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate build number
        run: |
          # Read version from pubspec.yaml (e.g., "1.0.0+3" → "1.0.0")
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | cut -d '+' -f1)
          echo "App version: $VERSION"

          # Find the commit where this version was first set
          FIRST_COMMIT=$(git log --all --reverse --format='%H' -S "version: $VERSION" -- pubspec.yaml | head -1)
          if [ -z "$FIRST_COMMIT" ]; then
            # Version has been there since the beginning
            BUILD_NUMBER=$(git rev-list --count HEAD)
          else
            # Count commits from that point to HEAD (inclusive)
            BUILD_NUMBER=$(git rev-list --count "$FIRST_COMMIT"..HEAD)
            BUILD_NUMBER=$((BUILD_NUMBER + 1))
          fi

          echo "Build number: $BUILD_NUMBER"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> "$GITHUB_ENV"

      - name: Select Xcode 16 (iOS 18 SDK)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      - name: Install dependencies and generate code
        run: |
          flutter pub get
          dart run build_runner build --delete-conflicting-outputs

      - name: Install fastlane
        run: sudo gem install fastlane

      - name: Import signing certificate
        uses: apple-actions/import-codesign-certs@v2
        with:
          p12-file-base64: ${{ secrets.IOS_DIST_CERT_BASE64 }}
          p12-password: ${{ secrets.IOS_DIST_CERT_PASSWORD }}

      - name: Install provisioning profile
        shell: bash
        env:
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          set -euo pipefail
          PROFILES_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_DIR"

          TMP_PROFILE_PATH="$PROFILES_DIR/nullfeed.mobileprovision"
          echo "$IOS_PROVISIONING_PROFILE_BASE64" | base64 --decode > "$TMP_PROFILE_PATH"

          PROFILE_UUID=$(/usr/bin/security cms -D -i "$TMP_PROFILE_PATH" | /usr/bin/plutil -extract UUID raw -)
          PROFILE_NAME=$(/usr/bin/security cms -D -i "$TMP_PROFILE_PATH" | /usr/bin/plutil -extract Name raw -)

          FINAL_PROFILE_PATH="$PROFILES_DIR/$PROFILE_UUID.mobileprovision"
          mv "$TMP_PROFILE_PATH" "$FINAL_PROFILE_PATH"

          echo "Installed provisioning profile: $PROFILE_NAME ($PROFILE_UUID)"
          echo "PROVISIONING_PROFILE_UUID=$PROFILE_UUID" >> "$GITHUB_ENV"
          echo "PROVISIONING_PROFILE_SPECIFIER=$PROFILE_NAME" >> "$GITHUB_ENV"

      - name: Configure signing
        run: |
          # Inject into Release.xcconfig
          echo "PROVISIONING_PROFILE_SPECIFIER=$PROVISIONING_PROFILE_UUID" >> ios/Flutter/Release.xcconfig
          cat ios/Flutter/Release.xcconfig

          # Generate ExportOptions.plist with the resolved UUID
          cat > ios/ExportOptions.plist << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>2M54LKDR89</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>codes.julian.nullfeed</key>
              <string>$PROVISIONING_PROFILE_UUID</string>
            </dict>
          </dict>
          </plist>
          PLIST
          echo "ExportOptions.plist:"
          cat ios/ExportOptions.plist

      - name: Build and upload to TestFlight
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_B64: ${{ secrets.APP_STORE_CONNECT_API_KEY_B64 }}
        run: |
          # Override the version+build from pubspec with the calculated build number
          flutter build ipa --release \
            --build-name="$VERSION" \
            --build-number="$BUILD_NUMBER" \
            --export-options-plist=ios/ExportOptions.plist
          
          cd ios
          fastlane beta
