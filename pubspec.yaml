name: nullfeed
description: A self-hosted YouTube media center.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.0
  flutter: '>=3.27.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  dio: ^5.7.0
  video_player: ^2.9.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  go_router: ^14.8.1
  cached_network_image: ^3.4.1
  web_socket_channel: ^3.0.1
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  intl: ^0.19.0
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.9.0
  riverpod_generator: ^2.6.2

flutter:
  uses-material-design: true

  fonts:
    - family: NullFeed
      fonts:
        - asset: fonts/NullFeed.ttf
